name: Build and Push Container Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_frontend:
        description: 'Build frontend image'
        type: boolean
        default: true
      build_renderer:
        description: 'Build renderer service image'
        type: boolean
        default: true
      build_image_processing:
        description: 'Build image processing service image'
        type: boolean
        default: true
      build_discord_bot:
        description: 'Build Discord bot image'
        type: boolean
        default: true
      deploy_convex:
        description: 'Deploy Convex backend (main branch only)'
        type: boolean
        default: false

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  # Only run path filtering on main branch pushes, not on tags
  changes:
    runs-on: arc-beastypage
    if: github.ref == 'refs/heads/main'
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      convex: ${{ steps.filter.outputs.convex }}
      renderer: ${{ steps.filter.outputs.renderer }}
      image_processing: ${{ steps.filter.outputs.image_processing }}
      discord_bot: ${{ steps.filter.outputs.discord_bot }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            convex:
              - 'frontend/convex/**'
            renderer:
              - 'backend/renderer_service/**'
            image_processing:
              - 'backend/image_processing_service/**'
            discord_bot:
              - 'backend/discord-bot/**'

  # Tags don't have path-filter outputs, so compute whether Convex changed
  # since the previous release tag before deciding to deploy.
  tag-convex-changes:
    runs-on: arc-beastypage
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      convex: ${{ steps.diff.outputs.convex }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: diff
        env:
          CURRENT_TAG: ${{ github.ref_name }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          previous_tag=$(
            git tag --sort=-version:refname \
              | grep -Fxv "$CURRENT_TAG" \
              | head -n 1
          )

          if [ -z "$previous_tag" ]; then
            echo "No previous release tag found; deploying Convex by default."
            echo "convex=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Comparing frontend/convex changes from $previous_tag to $CURRENT_SHA"

          if git diff --quiet "$previous_tag..$CURRENT_SHA" -- frontend/convex; then
            echo "convex=false" >> "$GITHUB_OUTPUT"
          else
            echo "convex=true" >> "$GITHUB_OUTPUT"
          fi

  deploy-convex:
    needs: [changes, tag-convex-changes]
    # Deploy only from protected release refs or explicit main-branch dispatches.
    if: |
      always() &&
      ((github.ref == 'refs/heads/main' &&
        needs.changes.outputs.convex == 'true') ||
       (startsWith(github.ref, 'refs/tags/v') &&
         needs.tag-convex-changes.outputs.convex == 'true') ||
       (github.ref == 'refs/heads/main' &&
        github.event.inputs.deploy_convex == 'true'))
    runs-on: arc-beastypage
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - run: pnpm exec convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

  build-frontend:
    needs: changes
    # Build if: tag push, frontend files changed on main, or manual trigger
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       needs.changes.outputs.frontend == 'true' ||
       github.event.inputs.build_frontend == 'true')
    runs-on: arc-beastypage
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4
        with:
          driver: remote
          endpoint: tcp://buildkitd.arc-runners.svc.cluster.local:1234

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/beastypage-frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      # Note: NEXT_PUBLIC_CONVEX_URL uses a placeholder at build time
      # and is injected at runtime via docker-entrypoint.sh
      - uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            CONVEX_DEPLOYMENT=${{ secrets.CONVEX_DEPLOYMENT }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            APP_VERSION=${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'dev' }}

  build-renderer:
    needs: changes
    # Build if: tag push, renderer files changed on main, or manual trigger
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       needs.changes.outputs.renderer == 'true' ||
       github.event.inputs.build_renderer == 'true')
    runs-on: arc-beastypage
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4
        with:
          driver: remote
          endpoint: tcp://buildkitd.arc-runners.svc.cluster.local:1234

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/beastypage-renderer
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v7
        with:
          context: ./backend/renderer_service
          file: ./backend/renderer_service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  build-image-processing:
    needs: changes
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       needs.changes.outputs.image_processing == 'true' ||
       github.event.inputs.build_image_processing == 'true')
    runs-on: arc-beastypage
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4
        with:
          driver: remote
          endpoint: tcp://buildkitd.arc-runners.svc.cluster.local:1234

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/beastypage-image-processing
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v7
        with:
          context: ./backend/image_processing_service
          file: ./backend/image_processing_service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  build-discord-bot:
    needs: changes
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       needs.changes.outputs.discord_bot == 'true' ||
       github.event.inputs.build_discord_bot == 'true')
    runs-on: arc-beastypage
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4
        with:
          driver: remote
          endpoint: tcp://buildkitd.arc-runners.svc.cluster.local:1234

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/beastypage-discord-bot
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v7
        with:
          context: ./backend/discord-bot
          file: ./backend/discord-bot/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
